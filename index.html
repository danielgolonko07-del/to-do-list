<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To do app</title>
</head>

<body>

  <label for="inputTask">New Task:</label>
  <input type="text" placeholder="Add a new task" id="inputTask">
  <button onclick="addTask()">Add Task</button><br>
  <select type="" id="category">
    <option value="all">All</option>
    <option value="done">Done</option>
    <option value="todo">To do</option>
  </select>

  <input type="radio" name="priority" radio id="lowPriority"><label for="lowPriority">Low priority</label>
  <input type="radio" name="priority" radio id="midPriority"><label for="midPriority">Mid priority</label>
  <input type="radio" name="priority" radio id="hightPriority"><label for="hightPriority">Hight priority</label>


  <div>
    <h3>To do:</h3>
    <span id="taskList"></span>
  </div>
  <div>
    <h3>Done:</h3>
    <span id="doneTask"></span>
  </div>

  <script src="to-do-list.js"></script>
</body>
